name: Button
machineName: button
status: true
required:
  - label
  - link
props:
  properties:
    label:
      type: string
      title: Label
      examples:
        - Learn more
    link:
      type: string
      format: uri-reference
      title: Link
      examples:
        - /page/1
    variant:
      type: string
      enum:
        - mauve
        - teal
        - surface
      meta:enum:
        mauve: Mauve
        teal: Teal
        surface: Surface
      title: Variant
      examples:
        - mauve
    width:
      type: string
      enum:
        - auto
        - full
      meta:enum:
        auto: Auto
        full: Full width
      title: Width
      examples:
        - auto
    size:
      type: string
      enum:
        - md
        - lg
      meta:enum:
        md: Medium
        lg: Large
      title: Size
      examples:
        - md
slots: []
